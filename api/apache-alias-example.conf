# Example snippet for XAMPP httpd.conf or extra/httpd-vhosts.conf
# Adjust the disk path to your AISCO clone. Restart Apache after editing.

LoadModule rewrite_module modules/mod_rewrite.so

# Replace with your clone’s api/public path (forward slashes on Windows are fine).
Alias /api "C:/xampp/htdocs/Work/Workability/AISCO/api/public"
<Directory "C:/xampp/htdocs/Work/Workability/AISCO/api/public">
    AllowOverride All
    Require all granted
</Directory>
